name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} / CI4 ${{ matrix.ci4 }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        ci4: ['^4.4', '^4.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring, json, xml
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}-ci4${{ matrix.ci4 }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-php${{ matrix.php }}-ci4${{ matrix.ci4 }}-
            composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer require "codeigniter4/framework:${{ matrix.ci4 }}" --no-interaction --no-progress

      - name: Run PHPUnit
        run: composer test -- --coverage-text

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3' && matrix.ci4 == '^4.5'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  analyse:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPStan
        run: composer analyse

  code-style:
    name: Code style (PHP-CS-Fixer)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2, cs2pr

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Check code style
        run: composer cs-check -- --format=checkstyle | cs2pr
